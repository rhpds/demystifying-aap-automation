---
# Waits until the AAP gateway route is accessible (HTTP 200/302).
# This is a regular Job (not PostSync hook) — the aap-instance Application
# is only Healthy when this Job completes successfully.
# ArgoCD uses this to gate sync-wave: "1" (Showroom) until AAP is ready.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.tenant.username }}-aap-route-wait
  namespace: {{ .Values.tenant.username }}-aap
spec:
  backoffLimit: 60     # 60 × 30s = 30 min max wait
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: wait-for-route
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command:
        - /bin/sh
        - -c
        - |
          GATEWAY_URL="https://{{ .Values.tenant.username }}-aap-{{ .Values.tenant.username }}-aap.{{ .Values.tenant.domain }}"

          echo "Waiting for AAP gateway route at ${GATEWAY_URL}..."
          until curl -sk \
            --max-time 10 \
            -o /dev/null \
            -w "%{http_code}" \
            "${GATEWAY_URL}" | grep -qE "^(200|302|301)"; do
            echo "Route not ready, retrying in 30s..."
            sleep 30
          done
          echo "AAP gateway route is active."
