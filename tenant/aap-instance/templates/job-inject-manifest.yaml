---
# Injects the AAP subscription manifest after AAP Controller is ready.
# AAP 2.6 requires manifest as base64-encoded JSON, not multipart/form-data.
# Skips gracefully if Controller is not reachable (Hub-only scenarios).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.tenant.username }}-aap-manifest
  namespace: {{ .Values.tenant.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: inject-manifest
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command:
        - /bin/sh
        - -c
        - |
          CONTROLLER_URL="https://{{ .Values.tenant.username }}-aap-controller-{{ .Values.tenant.namespace }}.{{ .Values.tenant.domain }}"
          echo "Checking if Controller is reachable..."
          HTTP=$(curl -sk --max-time 10 -o /dev/null -w "%{http_code}" "${CONTROLLER_URL}/api/v2/ping/" || echo "000")
          if [ "${HTTP}" = "000" ] || [ "${HTTP}" = "404" ]; then
            echo "Controller not available (HTTP ${HTTP}) — skipping manifest injection."
            exit 0
          fi
          echo "Waiting for AAP Controller..."
          until curl -sk --max-time 10 -u "admin:${ADMIN_PASSWORD}" "${CONTROLLER_URL}/api/v2/ping/" -o /dev/null -w "%{http_code}" | grep -q "200"; do
            echo "Controller not ready, retrying in 30s..."
            sleep 30
          done
          echo "Controller ready. Downloading manifest..."
          curl -sSL -o /tmp/manifest.zip "${MANIFEST_URL}"
          echo "Encoding manifest as base64..."
          B64=$(python3 -c "import base64; print(base64.b64encode(open('/tmp/manifest.zip','rb').read()).decode())")
          echo "Injecting manifest via JSON API..."
          RESULT=$(curl -sk -X POST \
            -u "admin:${ADMIN_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d "{\\"eula_accepted\\": true, \\"manifest\\": \\"${B64}\\"}" \
            -o /tmp/result.json \
            -w "%{http_code}" \
            "${CONTROLLER_URL}/api/v2/config/")
          echo "HTTP status: ${RESULT}"
          cat /tmp/result.json
          echo ""
          if echo "${RESULT}" | grep -qE "^2"; then
            echo "Manifest injected successfully."
          else
            echo "Manifest injection failed." && exit 1
          fi
        env:
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.tenant.username }}-aap-admin-password
              key: password
        - name: MANIFEST_URL
          value: {{ .Values.aap.manifest.url | quote }}
