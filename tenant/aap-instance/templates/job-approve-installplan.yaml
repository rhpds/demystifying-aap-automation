---
# Waits for the AAP operator CSV to reach Succeeded.
# With Automatic installPlanApproval, the InstallPlan is auto-approved —
# the job checks if CSV is already Succeeded first and exits immediately.
# Only looks for a pending InstallPlan if the CSV is not yet Succeeded.
# Runs at sync-wave 0 alongside the Subscription.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.tenant.username }}-aap-approve-installplan
  namespace: {{ .Values.tenant.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 40
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: aap-break-sa
      containers:
      - name: approve-installplan
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command:
        - /bin/sh
        - -c
        - |
          NS="{{ .Values.tenant.namespace }}"
          API="https://kubernetes.default.svc"
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

          # Check if CSV is already Succeeded (Automatic approval case)
          echo "Checking if CSV is already Succeeded..."
          STATUS=$(curl -sk --cacert ${CA} -H "Authorization: Bearer ${TOKEN}" \
            "${API}/apis/operators.coreos.com/v1alpha1/namespaces/${NS}/clusterserviceversions" \
            | python3 -c "import sys,json;d=json.load(sys.stdin);cs=d.get('items',[]);print(cs[0].get('status',{}).get('phase','none') if cs else 'none')" 2>/dev/null)
          echo "  CSV phase: ${STATUS}"
          if [ "${STATUS}" = "Succeeded" ]; then
            echo "CSV already Succeeded — nothing to approve."
            exit 0
          fi

          echo "Waiting for pending InstallPlan in ${NS}..."
          while true; do
            IP_NAME=$(curl -sk --cacert ${CA} -H "Authorization: Bearer ${TOKEN}" \
              "${API}/apis/operators.coreos.com/v1alpha1/namespaces/${NS}/installplans" \
              | python3 -c "import sys,json;d=json.load(sys.stdin);ps=[p for p in d.get('items',[]) if not p.get('spec',{}).get('approved',True)];print(ps[0]['metadata']['name'] if ps else '')" 2>/dev/null)
            [ -n "${IP_NAME}" ] && break

            # Re-check if CSV succeeded while waiting
            STATUS=$(curl -sk --cacert ${CA} -H "Authorization: Bearer ${TOKEN}" \
              "${API}/apis/operators.coreos.com/v1alpha1/namespaces/${NS}/clusterserviceversions" \
              | python3 -c "import sys,json;d=json.load(sys.stdin);cs=d.get('items',[]);print(cs[0].get('status',{}).get('phase','none') if cs else 'none')" 2>/dev/null)
            if [ "${STATUS}" = "Succeeded" ]; then
              echo "CSV reached Succeeded while waiting — done."
              exit 0
            fi
            echo "  No pending InstallPlan yet, retrying in 30s..."
            sleep 30
          done

          echo "Approving InstallPlan: ${IP_NAME}"
          curl -sk --cacert ${CA} -X PATCH \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/merge-patch+json" \
            "${API}/apis/operators.coreos.com/v1alpha1/namespaces/${NS}/installplans/${IP_NAME}" \
            -d '{"spec":{"approved":true}}' > /dev/null
          echo "InstallPlan approved."

          echo "Waiting for CSV to reach Succeeded..."
          while true; do
            STATUS=$(curl -sk --cacert ${CA} -H "Authorization: Bearer ${TOKEN}" \
              "${API}/apis/operators.coreos.com/v1alpha1/namespaces/${NS}/clusterserviceversions" \
              | python3 -c "import sys,json;d=json.load(sys.stdin);cs=d.get('items',[]);print(cs[0].get('status',{}).get('phase','unknown') if cs else 'none')" 2>/dev/null)
            echo "  CSV phase: ${STATUS}"
            [ "${STATUS}" = "Succeeded" ] && break
            [ "${STATUS}" = "Failed" ] && echo "CSV failed!" && exit 1
            sleep 30
          done
          echo "AAP operator ready."
