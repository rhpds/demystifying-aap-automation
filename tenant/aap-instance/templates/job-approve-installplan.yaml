---
# Waits for the AAP operator to be ready.
# With Automatic installPlanApproval, checks Subscription state (AtLatestKnown)
# rather than CSV phase (list endpoint truncates large CSV status objects).
# Exits immediately if operator is already installed, otherwise approves the
# pending InstallPlan and waits.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.tenant.username }}-aap-approve-installplan
  namespace: {{ .Values.tenant.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 40
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: aap-break-sa
      containers:
      - name: approve-installplan
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command:
        - /bin/sh
        - -c
        - |
          NS="{{ .Values.tenant.namespace }}"
          API="https://kubernetes.default.svc"
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          SUB="ansible-automation-platform-operator"

          get_sub_state() {
            curl -sk --cacert ${CA} -H "Authorization: Bearer ${TOKEN}" \
              "${API}/apis/operators.coreos.com/v1alpha1/namespaces/${NS}/subscriptions/${SUB}" \
              | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('status',{}).get('state','none'))" 2>/dev/null
          }

          # Check if operator is already installed (Automatic approval case)
          echo "Checking Subscription state..."
          STATE=$(get_sub_state)
          echo "  Subscription state: ${STATE}"
          if [ "${STATE}" = "AtLatestKnown" ]; then
            echo "Operator already installed — nothing to approve."
            exit 0
          fi

          echo "Waiting for pending InstallPlan in ${NS}..."
          while true; do
            IP_NAME=$(curl -sk --cacert ${CA} -H "Authorization: Bearer ${TOKEN}" \
              "${API}/apis/operators.coreos.com/v1alpha1/namespaces/${NS}/installplans" \
              | python3 -c "import sys,json;d=json.load(sys.stdin);ps=[p for p in d.get('items',[]) if not p.get('spec',{}).get('approved',True)];print(ps[0]['metadata']['name'] if ps else '')" 2>/dev/null)
            [ -n "${IP_NAME}" ] && break

            STATE=$(get_sub_state)
            if [ "${STATE}" = "AtLatestKnown" ]; then
              echo "Operator reached AtLatestKnown while waiting — done."
              exit 0
            fi
            echo "  No pending InstallPlan (state: ${STATE}), retrying in 30s..."
            sleep 30
          done

          echo "Approving InstallPlan: ${IP_NAME}"
          curl -sk --cacert ${CA} -X PATCH \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/merge-patch+json" \
            "${API}/apis/operators.coreos.com/v1alpha1/namespaces/${NS}/installplans/${IP_NAME}" \
            -d '{"spec":{"approved":true}}' > /dev/null
          echo "InstallPlan approved. Waiting for operator to be ready..."

          while true; do
            STATE=$(get_sub_state)
            echo "  Subscription state: ${STATE}"
            [ "${STATE}" = "AtLatestKnown" ] && break
            sleep 30
          done
          echo "AAP operator ready."
